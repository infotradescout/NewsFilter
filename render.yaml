services:
  - type: web
    name: newsfilter
    env: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start:render
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: HOURLY_SYNC_CRON
        value: "10 * * * *"
      - key: APP_BASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_SUMMARY_MODEL
        value: gpt-4.1-mini
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: newsfilter-db
          property: connectionString

databases:
  - name: newsfilter-db
    plan: free
